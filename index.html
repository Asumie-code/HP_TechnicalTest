<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>tech_test</title>
</head>

<body>
    <section id="device">
        <div class="main_image_container">
            <div><img class="deviceImage" width="200px" src="" alt="Device visual display"></div>
        </div>
        <div>
            <div>
                <div class="drop_container">
                    <p class="deviceInfoLabel">Select device:</p> <select id="productDropdown" class="deviceDropdown">
                    </select>
                </div>
                <div class="deviceInfoProperties">
                    <p class="deviceInfoProperty">{deviceName}</p>
                    <p class="deviceInfoProperty">{warrantyStatus}</p>
                    <p class="deviceInfoProperty">{productNumber}</p>
                </div>
            </div>
        </div>
        </div>
    </section>
    <hr>
    <h2>Promotion and deals</h2>
    <section id="position_1">
        <div class="carousel-container">
            <div id="carousel_wrapper" class="carousel-track"></div>
            <div class="carousel-controls"> <button tabindex=0 class="carousel-control-button carousel-prev">
                    <div></div>
                </button> <button tabindex=0 class="carousel-control-button carousel-next">
                    <div></div>
                </button> </div>
        </div>
        <div class="right_column_div">
            <div id="right_tile_1"></div>
            <div id="right_tile_2"></div>
        </div>
    </section>
    <hr>
    <h2>You may also like</h2>
    <section id="position_2"> </section>
    <section id="event-log"> </section>
    <footer id="sticky-footer"> </footer>
</body>

</html>
