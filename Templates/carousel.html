<div class=carousel>
    <style>
        .carousel {
            border-radius: 16px;
            box-shadow: 0 1px 4px 1px rgb(33, 33, 33, 0.2);
            padding: 30px;
            height: 534px;
        }

        .carousel__image {
            max-height: 96px;
            margin-bottom: 20px;
        }

        .carousel__text-wrapper {}

        .carousel__title {
            font-size: 32px;
        }

        .carousel__description {
            font-size: 20px;
            line-height: 28px;
            margin-bottom: 20px
        }

        .carousel__button {
            color: #fff;
            background-color: #0278AB;
            border-radius: 8px;
            padding: 8px 20px;
            max-width: 200px;
            border: none;
            font-size: 16px;
            line-height: 20px;
            text-wrap: nowrap;
            cursor: pointer;
        }

        .carousel__button:hover {
            background-color: #035C84;
        }

        .carousel__button:active,
        .carousel__button:focus-visible {
            background-color: #014667;
            cursor: pointer;
            outline: none;
        }
    </style>
    <div class=carousel__image-wrapper>
        <image class=carousel__image title="Offer logo" alt="Offer logo">
    </div>
    <div class=carousel__text-wrapper>
        <div class=carousel__title></div>
        <div class=carousel__description></div> <button title="CTA" class=carousel__button></button>
    </div>
</div>
