<style>
    .footer__button {
        color: #fff;
        background-color: #0278AB;
        border-radius: 8px;
        padding: 8px 20px;
        max-width: 200px;
        border: none;
        font-size: 16px;
        line-height: 20px;
        white-space: nowrap;
        cursor: pointer;
    }

    .footer__button:hover {
        background-color: #035C84;
    }

    .footer__button:active,
    .footer__button:focus-visible {
        background-color: #014667;
        cursor: pointer;
        outline: none;
    }

    .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 60px;
        background-color: #fff;
        gap: 24px;
        border-top: 1px solid #000000;
    }

    @media (max-width: 600px) {
        .footer {
            justify-content: flex-start;
            padding-left: 10px;
        }

        .footer__title {
            display: none;
        }
    }
</style>
<div class=footer>
    <div class=footer__title>{{title}}</div> <button class=footer__button>{{buttonText}}</button>
</div>
